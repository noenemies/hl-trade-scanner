name: trade-scanner
on:
  schedule:
    - cron: '*/30 * * * *'   # во время цепочки встают в очередь и подхватывают эстафету
  workflow_dispatch:
concurrency:
  group: scanner
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  chain:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      TZ: America/Chicago
      CI: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: scan loop (10 итераций по ~29 минут)
        run: |
          git config user.name "scanner-bot"
          git config user.email "scanner@local"
          for i in $(seq 1 10); do
            echo "--- итерация $i: $(date) ---"
            git pull --rebase origin main || true
            python3 trade_scanner.py --auto --quiet || true
            git add -A -- '*.json' signals.log 2>/dev/null || true
            if git commit -m "state $(date -u +%F_%H%M)"; then
              git push origin main || (git pull --rebase origin main && git push origin main) || true
            fi
            [ "$i" -lt 10 ] && sleep 1680
          done
